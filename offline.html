<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Guias — Sem conexão</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/mcguias/manifest.json">
  <link rel="apple-touch-icon" href="/mcguias/icons/icon-192.png">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 32px 24px;
      gap: 16px;
    }
    .offline-icon { font-size: 64px; margin-bottom: 8px; }
    .offline-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }
    .offline-sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.6;
    }
    .offline-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .offline-btn:hover { background: var(--red-dark); }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('mc_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="offline-icon">📡</div>
  <div class="offline-title">Sem conexão</div>
  <p class="offline-sub">Você está offline. Conecte-se à internet para acessar o MC Guias.</p>
  <button class="offline-btn" onclick="location.reload()">Tentar novamente</button>
  <a href="index.html" style="font-size:13px;color:var(--muted);margin-top:4px;">← Voltar ao início</a>
</body>
</html>
