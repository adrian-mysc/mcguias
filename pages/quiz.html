    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; }

      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      border: 2px solid var(--border);

      color: var(--muted);

      transition: all 0.15s;

      background: var(--card);

      border: 1.5px solid var(--border);

      text-align: center;
      box-shadow: var(--shadow-md);

    .start-card p  { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  </style>

  <script>
    // Splash — dismiss after fonts + content ready
    (function() {
      var t = localStorage.getItem('mc_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      function hideSplash() {
        var s = document.getElementById('splash');
        if (!s) return;
        s.classList.add('hide');
        setTimeout(function() { s.style.display = 'none'; }, 420);
      }
      if (document.readyState === 'complete') {
        setTimeout(hideSplash, 700);
      } else {
        window.addEventListener('load', function() { setTimeout(hideSplash, 700); });
      }
    })();
  </script>

      { guide: "montagem",  category: "🍽️ Montagem · Bandeja", question: "Como devem ser posicionadas as McFritas na bandeja?", options: ["Em pé, ao centro", "Inclinadas em relação às entradas, no lado direito", "Deitadas ao lado da bebida", "Em qualquer posição"], answer: "Inclinadas em relação às entradas, no lado direito", explanation: "McFritas ficam inclinadas em relação às entradas para melhor acomodação, no lado direito da bandeja." },
      { guide: "montagem",  category: "🛎️ Montagem · Entrega", question: "Como conferir o pedido antes de servir?", options: ["Não é necessário conferir", "Comparar itens da bandeja com o monitor de Apresentação", "Apenas verificar o número do pedido", "Perguntar ao cliente o que pediu"], answer: "Comparar itens da bandeja com o monitor de Apresentação", explanation: "Fazer a conferência comparando os itens da bandeja com os listados no monitor de Apresentação." },
      { guide: "montagem",  category: "🛎️ Montagem · Entrega", question: "Onde deve ser posicionada a bandeja após usar o Bump Bar?", options: ["Na mesa de condimentação", "No canto oposto aos monitores", "Em cima do ORB", "Na área de espera do cliente"], answer: "No canto oposto aos monitores", explanation: "Após usar o Bump Bar, suba a bandeja e posicione-a no canto oposto aos monitores." },
      { guide: "montagem",  category: "🛎️ Montagem · Entrega", question: "Como chamar o cliente na área de entrega?", options: ["Gritando o número do pedido em voz alta", "Levantando o Pick List na altura dos olhos sem gritar", "Usando o sistema de som do restaurante", "Esperando o cliente vir até o balcão"], answer: "Levantando o Pick List na altura dos olhos sem gritar", explanation: "Levantar o Pick List com o número do pedido na altura dos olhos para localizar o cliente — sem gritar." },
      { guide: "montagem",  category: "⏱️ Montagem · R2P", question: "O que o R2P mede exatamente?", options: ["Tempo do pedido ao cliente", "Tempo do PREPARANDO ao PRONTO", "Tempo de montagem da bandeja", "Tempo de espera na fila"], answer: "Tempo do PREPARANDO ao PRONTO", explanation: "R2P = Receipt to Present. Mede o tempo do momento que o pedido entra em PREPARANDO até sair para PRONTO." },
      { guide: "montagem",  category: "🛎️ Montagem · Entrega", question: "O que fazer com itens adicionais como molhos de nuggets e canudos?", options: ["Só incluir se o cliente pedir", "Colocar no pedido ao conferir com o monitor de Apresentação", "Deixar na estação de suprimentos", "Perguntar ao expedidor"], answer: "Colocar no pedido ao conferir com o monitor de Apresentação", explanation: "Colocar itens adicionais (molhos, canudos, açúcares, adoçantes) no pedido ao conferir com o monitor de Apresentação." },
      { guide: "montagem",  category: "☕ Montagem · Café da Manhã", question: "O que perguntar ao cliente no Café da Manhã sobre a bebida quente?", options: ["Se quer leite", "Se aceita açúcar ou adoçante, servindo com mexedor, guardanapo e tampa", "Se quer cappuccino", "Se quer a bebida quentinha"], answer: "Se aceita açúcar ou adoçante, servindo com mexedor, guardanapo e tampa", explanation: "No Café da Manhã, verificar condimentos no monitor de Apresentação e perguntar se o cliente aceita açúcar ou adoçante. Servir com mexedor, guardanapos e tampa da bebida." },
      { guide: "montagem",  category: "🥤 Montagem · Procedimento", question: "Qual é o nível correto de preenchimento das bebidas?", options: ["Até a borda do copo", "Até a tarja de volume indicada", "3/4 do copo", "Até onde o gelo permitir"], answer: "Até a tarja de volume indicada", explanation: "Servir somente bebidas com nível correto de refrigerante, suco, bebidas do Café da Manhã e McShake — até a tarja de volume." },
      { guide: "montagem",  category: "🥤 Montagem · Sobremesas", question: "Quem deve preparar as sobremesas durante a montagem?", options: ["Sempre o expedidor", "Quem não estiver com bebidas, ou somente Casquinha e McColosso se houver pessoa de bebidas", "A pessoa de bebidas sempre", "O gerente"], answer: "Quem não estiver com bebidas, ou somente Casquinha e McColosso se houver pessoa de bebidas", explanation: "Prepare as sobremesas. Se estiver trabalhando com a pessoa de bebidas, faça somente Casquinha e McColosso." },
      { guide: "montagem",  category: "🛎️ Montagem · Entrega", question: "Para onde direcionar o cliente após receber o pedido?", options: ["Para a fila novamente", "Para a estação de suprimentos para resolver qualquer solicitação posterior", "Para o gerente", "Para a saída"], answer: "Para a estação de suprimentos para resolver qualquer solicitação posterior", explanation: "Direcionar o cliente para a estação de suprimentos e resolver qualquer solicitação posterior relacionada ao pedido." },

      // ===================== EMBAIXADOR DA EXPERIÊNCIA =====================
      { guide: "embaixador", category: "🌟 Perfil do Cargo", question: "Qual é a principal função do Embaixador da Experiência do Cliente?", options: ["Limpar o salão e banheiros", "Proporcionar um momento único para cada cliente no local", "Anotar pedidos e operar o caixa", "Fazer escultura de balões durante todo o turno"], answer: "Proporcionar um momento único para cada cliente no local", explanation: "O Embaixador executa atividades de atendimento ao cliente no local para que cada cliente vivencie a Experiência McDonald's." },
      { guide: "embaixador", category: "🌟 Perfil do Cargo", question: "Qual das opções NÃO faz parte do perfil desejado do Embaixador?", options: ["Vocação para serviço", "Empatia com crianças", "Foco na operação de caixa", "Atitude positiva e proativa"], answer: "Foco na operação de caixa", explanation: "O perfil do Embaixador inclui: vocação para serviço, hospitalidade, boa comunicação, extroversão, empatia com crianças, atitude positiva, imagem pessoal e foco na venda — não na operação de caixa." },
      { guide: "embaixador", category: "🌟 Perfil do Cargo", question: "Qual é a característica de comportamento esperada do Embaixador ao lidar com crianças?", options: ["Antecipar o que a criança quer dizer", "Interromper se necessário", "Nunca antecipar ou interromper a criança enquanto fala", "Conversar apenas com os pais"], answer: "Nunca antecipar ou interromper a criança enquanto fala", explanation: "O Embaixador NÃO deve antecipar ou interromper a criança enquanto fala — deixar a criança se expressar livremente faz parte de proporcionar uma experiência especial." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "Qual é o período chave para realizar o pós-venda?", options: ["Café da manhã e tarde", "Almoço e jantar", "Apenas finais de semana", "Abertura e fechamento"], answer: "Almoço e jantar", explanation: "O Embaixador não deve deixar de realizar pós-vendas no horário de almoço e jantar — esses são os períodos chave." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "O que o Embaixador deve fazer em caso de queixas de clientes?", options: ["Chamar o gerente imediatamente", "Ignorar e continuar as atividades", "Pedir desculpas pelo erro, agradecer pela espera e verificar a satisfação", "Oferecer desconto imediato"], answer: "Pedir desculpas pelo erro, agradecer pela espera e verificar a satisfação", explanation: "Em caso de queixas, o Embaixador deve pedir desculpas pelo erro, agradecer pela espera e verificar que o cliente esteja satisfeito." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "Quais vendas o Embaixador pode realizar no salão?", options: ["Apenas sobremesas", "Apenas bebidas quentes", "Sobremesas, bebidas frias e quentes", "Apenas lanches"], answer: "Sobremesas, bebidas frias e quentes", explanation: "O Embaixador realiza vendas de sobremesas, bebidas frias e quentes no salão." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "O que significa 'realizar a 2ª volta do café' na função do Embaixador?", options: ["Fazer o café duas vezes", "Oferecer uma segunda rodada de café aos clientes", "Conferir a qualidade do café", "Repor o estoque de café"], answer: "Oferecer uma segunda rodada de café aos clientes", explanation: "Expressar excelência de serviço inclui realizar a 2ª volta do café nos horários do café da manhã e tarde — uma ação de hospitalidade." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "Qual atividade o Embaixador deve oferecer aos clientes durante a visita?", options: ["Mostrar a cozinha", "Oferecer e conduzir Tours pelo restaurante", "Organizar o salão", "Limpar as mesas"], answer: "Oferecer e conduzir Tours pelo restaurante", explanation: "O Embaixador deve oferecer e conduzir Tours, colaborando com o Gerente de Plantão no processo de visita à parte interna do restaurante." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "Como o Embaixador deve tratar as crianças que visitam o restaurante?", options: ["Com atenção básica", "Como clientes comuns", "Como se fossem estrelas", "Com brincadeiras rápidas"], answer: "Como se fossem estrelas", explanation: "O Embaixador deve entregar PDPs e realizar atividades com todas as crianças, tratando-as como se fossem estrelas." },
      { guide: "embaixador", category: "✅ O que Fazer", question: "Até qual distância em torno do restaurante o Embaixador pode entregar cupons e panfletos?", options: ["500 metros", "1 km", "2 km", "5 km"], answer: "2 km", explanation: "A promoção de lançamentos inclui entrega de cupons e panfletos dentro do local ou trading área do restaurante, considerando uma distância de até 2km." },
      { guide: "embaixador", category: "❌ O que Não Fazer", question: "Qual das atividades a seguir o Embaixador NÃO deve realizar?", options: ["Pós-venda no almoço", "Entregar PDPs às crianças", "Limpar banheiros e trocar lixeiras", "Oferecer tours"], answer: "Limpar banheiros e trocar lixeiras", explanation: "O Embaixador NÃO deve limpar mesas, banheiros ou trocar lixeiras — essas são funções de outra posição." },
      { guide: "embaixador", category: "❌ O que Não Fazer", question: "O Embaixador pode ficar posicionado 100% do tempo fazendo escultura de balões?", options: ["Sim, se não houver clientes", "Sim, nos finais de semana", "Não, nunca", "Sim, durante horários de baixo movimento"], answer: "Não, nunca", explanation: "O Embaixador NÃO deve ficar posicionado 100% do tempo realizando escultura de balões — a escultura é uma atividade complementar, não a principal." },
